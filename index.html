<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TIFY Viewer</title>

<!-- TIFY CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tify@0.29.0/dist/tify.css">

<style>
html, body {
  margin: 0;
  height: 100%;
}

#viewer {
  height: 100vh;
}

/* Make the whole viewer transparent */
.tify,
.tify-content,
.tify-viewer {
  background: transparent !important;
}

/* remove body background */
body {
  background: transparent;
}
  
/* hide UI buttons */
.tify-header button {
  display: none !important;
}
  
 /* Increase height of title bar */
.tify-header {
  height: 70px !important;
  min-height: 70px !important;
  padding: 10px 20px !important;
  display: flex;
  align-items: center;
  position: relative;
}
 
.tify-header-title {
  font-size: 20px !important;
  font-weight: bold;
}

/* Center the title text */
.tify-header-title {
  text-align: center;
  flex: 1;
}

</style>
</head>

<body>

<div id="viewer"></div>

<!-- TIFY JS -->
<script src="https://cdn.jsdelivr.net/npm/tify@0.29.0/dist/tify.js"></script>

<script>
  new Tify({
    container: '#viewer',

    // use LOCAL manifest (important!)
    manifestUrl: 'manifest.json'
  });
</script>

</body>
</html>

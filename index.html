<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mirador Viewer</title>

<!-- ✅ Mirador CSS -->
<link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/css/mirador.min    margin: 0;
    height: 100%;
  }

  #viewer {
    height: 100vh;
  }
</style>
</head>

<body>

<div id="viewer"></div>

<!-- ✅ Mirador JS -->
<script src="https://unpkg.com/mirador@3.3.0.min.js</script>

<script>
  const miradorInstance = Mirador.viewer({
    id: "viewer",

    windows: [
      {
        // ✅ THIS is where your manifest goes
        manifestId: "https://markus-jcu.github.io/IIIF-project/manifest.json",

        // optional
        sideBarOpen: false
      }
    ]
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mirador Viewer</title>

<link rel="stylesheet" href="https://unpkg.com/mirador@3.3.0/dist/css/mirador.min.css">
<script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>

<style>
  html, body {
    margin: 0;
    height: 100%;
  }

  #viewer {
    height: 100vh;
  }

  /* ✅ Hide Mirador UI */
  .MuiAppBar-root,
  .MuiDrawer-root,
  .MuiButtonBase-root[title="Toggle sidebar"] {
    display: none !important;
  }

  /* ✅ Caption overlay */
  #caption {
    position: fixed;
    bottom: 0;
    width: 100%;
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 10px 20px;
    font-size: 16px;
    z-index: 999;
  }

  /* ✅ Navigation buttons */
  .nav-btn {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    font-size: 24px;
    color: white;
    background: rgba(0,0,0,0.5);
    border: none;
    padding: 8px 12px;
    cursor: pointer;
    z-index: 999;
  }

  #prevBtn { left: 10px; }
  #nextBtn { right: 10px; }
</style>
</head>

<body>

<div id="viewer"></div>
<div id="caption"></div>

<button id="prevBtn" class="nav-btn">◀</button>
<button id="nextBtn" class="nav-btn">▶</button>

<script>
  const manifestUrl = "https://markus-jcu.github.io/IIIF-project/manifest.json";

  const captions = [
    "NYH1 – Historical image description",
    "NYH2 – Add your second caption",
    "NYH3 – Add your third caption"
  ];

  let currentIndex = 0;
  let miradorInstance;

  function loadCanvas(index) {
    miradorInstance.store.dispatch({
      type: 'SET_CANVAS',
      windowId: 'window-1',
      canvasId: manifestUrl + '/canvas/p' + (index + 1)
    });

    document.getElementById("caption").innerText = captions[index];
  }

  // ✅ Create Mirador
  miradorInstance = Mirador.viewer({
    id: "viewer",

    windows: [
      {
        id: "window-1",
        manifestId: manifestUrl,
        sideBarOpen: false
      }
    ]
  });

  // ✅ Wait a moment for Mirador to load
  setTimeout(() => {
    document.getElementById("caption").innerText = captions[0];
  }, 1000);

  // ✅ Navigation
  document.getElementById("nextBtn").onclick = () => {
    currentIndex = (currentIndex + 1) % captions.length;
    loadCanvas(currentIndex);
  };

  document.getElementById("prevBtn").onclick = () => {
    currentIndex = (currentIndex - 1 + captions.length) % captions.length;
    loadCanvas(currentIndex);
  };
</script>

</body>
</html>

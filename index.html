<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TIFY Viewer</title>

<!-- ✅ REQUIRED CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tify@0.29.0/dist/tify    margin: 0;
    height: 100%;
  }

  #viewer {
    height: 100vh;
  }
</style>
</head>

<body>

<!-- ✅ IMPORTANT: ID must match JS -->
<div id="viewer"></div>

<!-- ✅ REQUIRED JS -->
<script src="https://cdn.jsdelivr.net/npm/tify@0.29.0/dist/tify.jscript>
  console.log("TIFY loading...");

  new Tify({
    container: '#viewer',
    manifestUrl: 'https://markus-jcu.github.io/IIIF-project/manifest.json'
  });
</script>

</body>
</html>

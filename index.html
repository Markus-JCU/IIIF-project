<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TIFY Viewer</title>

<!-- ✅ TIFY CSS -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tify@0.29.0/dist/tify.css">

<style>
  html, body {
    margin: 0;
    height: 100%;
  }

  #viewer {
    height: 100vh;
  }
</style>
</head>

<body>

<div id="viewer"></div>

<!-- ✅ TIFY JS -->
<script src="https://cdn.jsdelivr.net/npm/tify@0.29.0/dist/tify.js"></script>

<script>
  new Tify({
    container: '#viewer',

    // ✅ use LOCAL manifest (important!)
    manifestUrl: 'manifest.json'
  });
</script>

</body>
</html>

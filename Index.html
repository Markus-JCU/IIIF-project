<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NYH IIIF Viewer</title>

  <!-- Mirador CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/mirador@latest/dist/css/mirador.min.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    #viewer {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>

<header style="padding:10px; background:#222; color:white;">
  <h2>NYH Image Collection</h2>
</header> 
  
<div id="viewer"></div>

<!-- Mirador JS -->
<script src="https://unpkg.com/mirador@3.3.0/dist/mirador.min.js"></script>

<script>
  <script>
  const miradorInstance = Mirador.viewer({
    id: "viewer",

    windows: [
      {
        manifestId: "https://markus-jcu.github.io/IIIF-project/manifest.json",
        sideBarOpen: false 
      }
    ],

    window: {             
      sideBarOpen: false,
      views: [
        { key: "single" }
      ],
      panels: {
        info: false,
        attribution: false,
        canvas: false,
        annotations: false,
        search: false
      }
    },

    workspace: {
      type: "mosaic"
    }
  });
</script>
</script>

</body>
</html>

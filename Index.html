<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IIIF Image Viewer</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/openseadragon/4.1.0/openseadragon.min.js"></script>

  <style>
    body {
      margin: 0;
    }
    #viewer {
      width: 100vw;
      height: 100vh;
      background: black;
    }
  </style>
</head>
<body>

<div id="viewer"></div>


Mirador.viewer({
  id: "viewer",

  windows: [
    {
      manifestId: "https://markus-jcu.github.io/IIIF-project/manifest.json",
      sideBarOpen: false
    }
  ]
});



</body>
</html>

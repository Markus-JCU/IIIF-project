<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NYH IIIF Viewer</title>

const miradorInstance = Mirador.viewer({
  window: {
    allowClose: false,
    allowMaximize: false,
    sideBarOpen: false,
    views: [
      { key: 'single' } // removes gallery/thumbnail alternatives
    ]
  },
  workspace: {
    showZoomControls: true
  }
}); 
  
  <!-- Mirador CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/mirador@latest/dist/css/mirador.min.css"
  />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    #viewer {
      height: 100vh;
      width: 100%;
    }
  </style>
</head>
<body>


  


<!-- Mirador JS -->
<script src="https://unpkg.com/mirador@latest/dist/mirador.min.js"></script>

<script>
  const miradorInstance = Mirador.viewer({
    id: "viewer",

    windows: [
      {
        manifestId: "https://markus-jcu.github.io/IIIF-project/manifest.json"
      }
    ],

    workspace: {
      type: "mosaic"
    }
  });
</script>

</body>
</html>
